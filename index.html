<html lang="en">
<head>
    <style>
        body {background-color: powderblue;}
        h1   {color: blue;}
        p    {color: red;}
    </style>
    <title>Mia's notes</title>
</head>
<body>
    <audio controls autoplay>
      <source src="1-02 Ascension.mp3" type="audio/mpeg">
    </audio>
    <h1>this is the main page</h1>
    <a href="school/">HIGH SCHOOL</a>
    <a href="college/">COLLEGE</a>
    <a href="ideas/">IDEAS</a>
    <div class="popup-box">
        <div class="popup show">
            <div class="content">
                <header>
                    <p>Add a new note</p>
                </header>
                <form action="#">
                    <div class="row tile">
                        <label>Title</label>
                        <input type="text" id="input">
                    </div>
                    <div class="row description">
                        <label for="">Description</label>
                       <textarea name="" id=""></textarea>
                    </div>
                    <button class="add-note">Add Note</button>
                </form>
            </div>
        </div>
    </div>
<div class="wrapper">
   <li class="add-box">
    <div class="icon"><i class="uil uil-plus"></i></div>
    <p>Add new note</p>
   </li>

   <li class="note">
    <div class="details">
        <p>This is a Title</p>
        <span>this is the note</span>
    </div>


</div>
<script src="script.js"></script>
</body>
</html>
